                    Updating your dashboard with the latest academic data. This will just take a moment.
                </p>
</div>
</main>
</div>
<script>
    const API_BASE = "http://localhost:8000";

    // 1. Automatically trigger sync on page load
    async function startAutoSync() {
        console.log("[*] Initializing SPeCTRUM Sync...");
        
        try {
            // Call your FastAPI /sync endpoint
            const response = await fetch(`${API_BASE}/sync`);
            
            if (response.ok) {
                console.log("[+] Sync complete. Data summarized by Gemini.");
                
                // 2. Redirect to the main dashboard after a successful sync
                // Change 'dashboard.html' to the actual name of your live course grid file
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1000); 
            } else {
                showError("Sync failed on the server. Please check your terminal.");
            }
        } catch (err) {
            showError("Cannot connect to Backend. Is server.py running?");
        }
    }

    function showError(message) {
        const title = document.querySelector('h1');
        const subtitle = document.querySelector('p');
        const spinner = document.querySelector('.spinner');
        
        spinner.style.display = 'none';
        title.innerText = "Sync Failed";
        title.classList.add('text-error');
        subtitle.innerText = message;
    }

    // Initialize sync sequence
    window.onload = startAutoSync;
</script>
