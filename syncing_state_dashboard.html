<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Processing - ClarifyUM</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
    .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 4px 24px -6px rgba(0, 51, 102, 0.08); }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(0, 30, 64, 0.1); border-radius: 50%; border-top-color: #001e40; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-[#F8F9FA] text-slate-800 min-h-screen flex font-['Inter'] antialiased">

<div class="flex-1 flex flex-col relative w-full h-screen overflow-hidden">
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-blue-100 blur-[80px]"></div>
        <div class="absolute bottom-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-50 blur-[100px]"></div>
    </div>
    
    <main class="flex-1 relative z-10 flex flex-col items-center justify-center p-8">
        <div class="glass-panel rounded-xl p-8 flex flex-col items-center justify-center space-y-4 max-w-sm w-full text-center">
            <div class="spinner mb-2" id="spinnerIcon"></div>
            <h1 class="text-2xl font-bold text-[#001e40]" id="processTitle">Processing...</h1>
            <p class="text-sm text-slate-500 max-w-[250px]" id="processDesc">Analyzing data with ClarifyAI. This will take a few seconds.</p>
        </div>
    </main>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const dataUrl = sessionStorage.getItem("timetableImage");
        
        if (dataUrl) {
            document.getElementById('processTitle').innerText = "Extracting Schedule";
            document.getElementById('processDesc').innerText = "ClarifyAI is reading your timetable image. Please wait...";
            
            try {
                const fetchRes = await fetch(dataUrl);
                const blob = await fetchRes.blob();
                const formData = new FormData();
                formData.append("file", blob, "timetable.png");
                
                const response = await fetch("http://localhost:8000/timetable/upload", {
                    method: "POST",
                    body: formData
                });
                
                if (response.ok) {
                    sessionStorage.removeItem("timetableImage"); 
                    window.location.href = "dashboard.html"; 
                } else {
                    failProcess("AI Extraction failed. Please try a clearer image.");
                }
            } catch (error) { failProcess("Cannot connect to server. Is FastAPI running?"); }
        } else {
            // General sync process if no image is in storage
            document.getElementById('processTitle').innerText = "Syncing SPeCTRUM";
            try {
                const response = await fetch(`http://localhost:8000/sync`);
                if (response.ok) {
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1000); 
                } else { failProcess("Sync failed on the server."); }
            } catch (err) { failProcess("Backend offline."); }
        }
    });

    function failProcess(msg) {
        document.getElementById('spinnerIcon').style.display = 'none';
        document.getElementById('processTitle').innerText = "Process Failed";
        document.getElementById('processTitle').style.color = "red";
        document.getElementById('processDesc').innerText = msg;
        setTimeout(() => { window.location.href = "empty_state_dashboard.html"; }, 3000);
    }
</script>
</body></html>
