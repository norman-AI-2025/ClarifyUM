<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AI Smart Search - ClarifyUM</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .apple-shadow { box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02); }
        /* Clean scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8F9FA] text-slate-800 h-screen w-screen flex font-['Inter'] overflow-hidden m-0 p-0">

<nav class="hidden md:flex flex-col w-64 shrink-0 border-r border-slate-200/50 shadow-[4px_0_24px_rgba(0,51,102,0.03)] bg-white/80 backdrop-blur-xl py-6 space-y-2 z-40 relative">
    <div class="px-6 mb-8">
        <h1 class="text-xl font-bold text-[#003366]">ClarifyUM</h1>
        <p class="text-xs font-medium text-slate-500 mt-1 uppercase tracking-wider">Academic Portal</p>
    </div>
    <div class="flex-1 flex flex-col space-y-2 px-3">
        <a href="dashboard.html" class="flex items-center px-4 py-2 text-slate-500 hover:bg-slate-100/80 rounded-lg my-1 text-sm font-medium transition-colors"><span class="material-symbols-outlined mr-3 text-[20px]">dashboard</span>Dashboard</a>
        <a href="course_hub.html" class="flex items-center px-4 py-2 text-slate-500 hover:bg-slate-100/80 rounded-lg my-1 text-sm font-medium transition-colors"><span class="material-symbols-outlined mr-3 text-[20px]">grid_view</span>Course Grid</a>
        <a href="ai_chat.html" class="flex items-center px-4 py-2 text-[#003366] bg-blue-50/80 border border-blue-100/50 rounded-lg my-1 text-sm font-semibold shadow-sm"><span class="material-symbols-outlined mr-3 text-[20px]" style='font-variation-settings: "FILL" 1;'>search</span>Smart Search</a>
    </div>
</nav>

<main class="flex-1 flex flex-col h-screen min-w-0 bg-white relative">
    
    <header class="shrink-0 flex justify-between items-center h-16 px-8 w-full bg-white/90 backdrop-blur-md z-50 border-b border-slate-200/50 shadow-sm">
        <div class="md:hidden font-bold text-[#003366]">ClarifyUM</div>
        <div class="hidden md:block flex-1"></div>
        <div class="flex space-x-3 items-center">
            <button class="text-slate-400 hover:text-[#003366] hover:bg-slate-100 p-2 rounded-full transition-colors"><span class="material-symbols-outlined">notifications</span></button>
            <div class="h-8 w-8 rounded-full bg-slate-200 overflow-hidden shadow-sm border border-slate-200 cursor-pointer">
                <img alt="Profile" class="h-full w-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkMgFuh8ScFE6DelEkT-vsnUOfXwmQTCG-mBGG9X1qqmVSNmAX8xGPSKEDjuGwiCxzKYpyny3Qx-xHDAPSMR7M8K0-lpDCpXe6VQuLzy6gRpdWTsRwUeMMKPMUMWEvfdmhMGz1lcEU7k4oxxoZxeDJRbGLalJvCm3N8UWmbLT7Gf7SqTC4wrFK8iAOIxgbaSw7WGFnx9JHOG-CYPl9Lb9Z10_9CV9Vv1Ij1HhOSpfhGg2H4ywk-MlchBFnD41V-cX0OTbau8OM5u-g"/>
            </div>
        </div>
    </header>

    <div id="chatBox" class="flex-1 overflow-y-auto p-4 md:p-8 bg-[#F8F9FA]">
        <div class="max-w-4xl mx-auto space-y-6 pb-4" id="chatContainer">
            <div class="text-center mb-10 pt-6">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-gradient-to-br from-blue-50 to-indigo-50 text-[#003366] mb-4 shadow-sm border border-blue-100/50">
                    <span class="material-symbols-outlined text-2xl">auto_awesome</span>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">ClarifyAI Assistant</h2>
                <p class="text-sm text-slate-500 mt-2">Ask questions across your entire UM curriculum and upcoming tasks.</p>
            </div>
        </div>
    </div>

    <div class="shrink-0 p-4 md:px-8 md:py-6 bg-white border-t border-slate-200/50 z-10 w-full shadow-[0_-4px_24px_rgba(0,0,0,0.02)]">
        <form id="chatForm" class="max-w-4xl mx-auto relative flex items-center">
            <input id="promptInput" autocomplete="off" class="w-full bg-slate-50 hover:bg-white transition-colors rounded-full py-4 pl-6 pr-16 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#003366]/20 focus:bg-white text-slate-800 shadow-inner" placeholder="e.g., What assignments do I have due next week?" type="text"/>
            <button type="submit" id="sendBtn" class="absolute right-2 w-10 h-10 bg-[#003366] text-white rounded-full flex items-center justify-center hover:bg-blue-900 transition-all shadow-md hover:shadow-lg active:scale-95">
                <span class="material-symbols-outlined">arrow_upward</span>
            </button>
        </form>
    </div>
</main>

<script>
    const API_BASE = "http://localhost:8000";
    const chatContainer = document.getElementById('chatContainer');
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('promptInput');
    const chatForm = document.getElementById('chatForm');

    function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const text = userInput.value.trim();
        if (!text) return;
        userInput.value = "";
        
        chatContainer.innerHTML += `
            <div class="flex justify-end">
                <div class="bg-[#003366] text-white max-w-[80%] rounded-2xl rounded-tr-sm px-5 py-3 apple-shadow text-sm">${text}</div>
            </div>`;
        scrollToBottom();

        const loadId = "load-" + Date.now();
        chatContainer.innerHTML += `
            <div id="${loadId}" class="flex justify-start">
                <div class="bg-white rounded-2xl rounded-tl-sm px-6 py-4 apple-shadow border border-slate-100 flex items-center space-x-1.5">
                    <div class="w-2 h-2 bg-blue-300 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-blue-300 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-blue-300 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>`;
        scrollToBottom();

        try {
            const res = await fetch(`${API_BASE}/ai/query`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });
            const result = await res.json();
            
            document.getElementById(loadId).remove();
            
            let responseText = result.summary || "Sorry, I received an unexpected format from the AI.";
            
            // Double fallback just in case the backend is still running the old code
            if (typeof responseText === 'object') {
                responseText = JSON.stringify(responseText, null, 2);
            }
            
            const parsedHTML = marked.parse(responseText);

            chatContainer.innerHTML += `
                <div class="flex justify-start">
                    <div class="bg-white max-w-[90%] md:max-w-[85%] rounded-2xl rounded-tl-sm px-6 py-5 apple-shadow border border-slate-100">
                        <div class="flex items-center mb-3 text-[#003366]">
                            <span class="material-symbols-outlined mr-2 text-xl" style='font-variation-settings: "FILL" 1;'>auto_awesome</span>
                            <span class="text-sm font-bold">ClarifyAI</span>
                        </div>
                        <div class="text-sm text-slate-700 prose prose-sm prose-blue max-w-none leading-relaxed">${parsedHTML}</div>
                    </div>
                </div>`;
            scrollToBottom();

        } catch (err) {
            document.getElementById(loadId).innerHTML = `<p class="text-red-500 text-xs p-2">Failed to connect to backend.</p>`;
        }
    });
</script>
</body>
</html>
