<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - Empty State | ClarifyUM</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#003366",
                    "primary": "#001e40",
                    "surface": "#f8f9fa",
                    "surface-container-low": "#f3f4f5",
                    "on-surface-variant": "#43474f",
                    "background": "#f8f9fa",
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "body-md": ["Inter"],
            }
          }
        }
      }
    </script>
<style>
        body { background-color: theme('colors.background'); }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 24px -6px rgba(0, 51, 102, 0.08);
        }
        .glass-btn-primary {
            background: theme('colors.primary');
            color: white;
            box-shadow: 0 2px 8px -2px rgba(0, 30, 64, 0.3);
            transition: all 0.2s ease;
        }
        .glass-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px -2px rgba(0, 30, 64, 0.4);
        }
    </style>
</head>
<body class="flex min-h-screen text-slate-800 font-body-md">

<nav class="hidden md:flex flex-col bg-white/60 backdrop-blur-xl h-screen w-64 border-r border-slate-200/40 fixed left-0 top-0 shadow-xl shadow-blue-900/5 z-40 py-6 space-y-2 pb-4">
    <div class="px-4 mb-8">
        <span class="text-xl font-bold text-[#003366]">ClarifyUM</span>
        <span class="block text-xs font-medium text-slate-500 mt-1 uppercase tracking-tight">University Systems</span>
    </div>
</nav>

<main class="flex-1 w-full md:ml-64 flex flex-col min-h-screen relative overflow-hidden items-center justify-center">
    <div class="absolute inset-0 pointer-events-none -z-10 overflow-hidden">
        <div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-blue-100 blur-[100px] opacity-60"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-[50vw] h-[50vw] rounded-full bg-slate-200 blur-[120px] opacity-40"></div>
    </div>

    <div id="uploadContainer" class="w-full max-w-2xl mx-auto flex flex-col items-center text-center p-8 transition-opacity duration-300 opacity-0">
        <div class="glass-panel w-full aspect-video md:aspect-[2/1] rounded-[24px] flex flex-col items-center justify-center p-8 mb-8 relative overflow-hidden group">
            <div class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-surface-container-low border border-white flex items-center justify-center shadow-sm mb-6 relative">
                <span class="material-symbols-outlined text-[40px] md:text-[48px] text-primary/40 font-light">calendar_today</span>
                <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-primary rounded-full flex items-center justify-center text-white shadow-md border-2 border-white">
                    <span class="material-symbols-outlined text-[20px]">add</span>
                </div>
            </div>
            <h2 id="statusTitle" class="text-3xl font-bold text-primary mb-3">Checking Systems...</h2>
            <p id="statusDesc" class="text-lg text-slate-500 max-w-md mx-auto mb-8">Please wait while we check for existing data.</p>
            
            <div id="btnContainer" class="hidden flex-col sm:flex-row gap-4 w-full sm:w-auto z-10">
                <button onclick="document.getElementById('timetableInput').click()" class="glass-btn-primary px-8 py-3 rounded-full font-medium flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">upload_file</span> Upload Timetable
                </button>
            </div>
        </div>
        <div class="flex items-center gap-2 text-slate-500 text-sm bg-slate-100 px-4 py-2 rounded-full backdrop-blur-sm">
            <span class="material-symbols-outlined text-[16px]">info</span>
            <span>Supported formats: high-resolution screenshots.</span>
        </div>
    </div>
</main>

<input type="file" id="timetableInput" accept="image/*" class="hidden" onchange="processUpload(event)">

<script>
    const API_BASE = "http://localhost:8000";

    document.addEventListener("DOMContentLoaded", async () => {
        document.getElementById('uploadContainer').classList.remove('opacity-0');
        try {
            const res = await fetch(`${API_BASE}/data/status`);
            if (res.ok) {
                const status = await res.json();
                if (status.timetable_exists) {
                    document.getElementById('statusTitle').innerText = "Data Found";
                    document.getElementById('statusDesc').innerText = "Redirecting to your dashboard...";
                    window.location.href = "dashboard.html";
                    return; 
                }
            }
        } catch (err) { console.warn("Backend starting up."); }
        
        document.getElementById('statusTitle').innerText = "No Timetable Detected";
        document.getElementById('statusDesc').innerText = "Upload your class schedule to unlock personalized insights and curriculum tracking.";
        document.getElementById('btnContainer').classList.remove('hidden');
        document.getElementById('btnContainer').classList.add('flex');
    });

    function processUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            sessionStorage.setItem("timetableImage", e.target.result);
            window.location.href = "syncing_state_dashboard.html";
        };
        reader.readAsDataURL(file);
    }
</script>
</body></html>
